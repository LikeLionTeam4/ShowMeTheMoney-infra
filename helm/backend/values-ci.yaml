fullnameOverride: smtm-backend

image:
  repository: example.invalid/smtm-backend
  tag: ci

config:
  data:
    DB_HOST: database.example.invalid
    DB_PORT: "3306"
    DB_NAME: showmethemoney
    DB_SSL_MODE: REQUIRED
    CORS_ALLOWED_ORIGINS: https://smtm.example.invalid
    JWT_EXPIRATION: "86400"
    SPRING_PROFILES_ACTIVE: prod

secret:
  name: smtm-backend-secret

secretStore:
  enabled: true
  name: smtm-aws-secretsmanager
  region: ap-northeast-2

externalSecret:
  enabled: true
  target:
    name: smtm-backend-secret
  rds:
    key: ci/rds
  application:
    key: ci/application

autoscaling:
  enabled: true

podDisruptionBudget:
  enabled: true
