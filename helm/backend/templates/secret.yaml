{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USERNAME: {{ .Values.secret.data.DB_USERNAME | quote }}
  DB_PASSWORD: {{ .Values.secret.data.DB_PASSWORD | quote }}
  JWT_SECRET: {{ .Values.secret.data.JWT_SECRET | quote }}
{{- end }}
