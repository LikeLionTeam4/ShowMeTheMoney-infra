nameOverride: ""
fullnameOverride: ""

commonLabels:
  Version: smtm-v1

replicaCount: 2

image:
  repository: smtm-backend
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8080

strategy:
  maxSurge: 1
  maxUnavailable: 0

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 768Mi

probes:
  startup:
    path: /api/ping
    periodSeconds: 10
    failureThreshold: 30
  readiness:
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /api/ping
    initialDelaySeconds: 20
    periodSeconds: 20

config:
  enabled: true
  name: ""
  data:
    DB_HOST: localhost
    DB_PORT: "3306"
    DB_NAME: showmethemoney
    DB_SSL_MODE: DISABLED
    CORS_ALLOWED_ORIGINS: http://localhost:3000
    JWT_EXPIRATION: "86400"
    SPRING_PROFILES_ACTIVE: local

secret:
  name: smtm-backend-secret

secretStore:
  enabled: false
  name: smtm-aws-secretsmanager
  region: ap-northeast-2

externalSecret:
  enabled: false
  name: ""
  refreshInterval: 1h
  target:
    name: smtm-backend-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  rds:
    key: ""
  application:
    key: smtm/application

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpreadConstraints:
  enabled: true
  zone:
    maxSkew: 1
    whenUnsatisfiable: DoNotSchedule
  hostname:
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway
