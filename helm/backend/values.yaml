replicaCount: 2

image:
  repository: "<ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/team4-backend"
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8080

strategy:
  maxSurge: 1
  maxUnavailable: 0

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 768Mi

probes:
  # readiness: DB 등 의존성까지 확인 (실패 시 이 Pod로 트래픽만 안 보냄)
  # liveness: 프로세스 생존 여부만 확인 (DB 장애로 재시작 루프에 빠지지 않도록 별도 경로 사용)
  readiness:
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /api/ping
    initialDelaySeconds: 20
    periodSeconds: 20

# 백엔드 설정(DB, JWT, CORS 등)은 Secret에서 env로 주입한다.
# create: false가 기본값 — Secret은 클러스터에 미리 만들어져 있어야 한다
#   (kubectl create secret generic team4-backend-secret --from-literal=... 또는
#    External Secrets Operator + AWS Secrets Manager 연동).
# 로컬 테스트 등 임시로 차트가 Secret까지 만들게 하려면 create: true로 바꾸고
# data 값을 채운 뒤, 이 파일을 절대 커밋하지 말 것 (별도 values-secret.yaml로 분리해서 사용).
secret:
  name: team4-backend-secret
  create: false
  data:
    DB_HOST: ""
    DB_PORT: "3306"
    DB_NAME: "showmethemoney"
    DB_USERNAME: ""
    DB_PASSWORD: ""
    JWT_SECRET: ""
    JWT_EXPIRATION: "86400"
    CORS_ALLOWED_ORIGINS: "https://team4.mang.pe.kr"
