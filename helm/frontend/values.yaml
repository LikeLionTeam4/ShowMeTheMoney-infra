replicaCount: 2

image:
  # NEXT_PUBLIC_API_URL은 빌드타임에 번들에 박히므로, 도메인이 바뀌면
  # 이 태그(이미지)를 다시 빌드해야 한다 (docs/api/README 및 루트 README 참고).
  repository: "<ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/team4-frontend"
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 3000

strategy:
  maxSurge: 1
  maxUnavailable: 0

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

probes:
  path: /
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20

# ALB Ingress Controller 세팅 완료 후 true로 전환.
# host/annotations/backendService 값은 팀원의 EKS/도메인 구성이 확정되면 채울 것.
ingress:
  enabled: false
  className: alb
  host: team4.mang.pe.kr
  tlsSecretName: team4-tls
  backendServiceName: team4-backend
  backendServicePort: 8080
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
