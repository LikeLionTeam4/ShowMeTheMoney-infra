nameOverride: ""
fullnameOverride: ""

commonLabels:
  Version: smtm-v1

replicaCount: 2

image:
  # NEXT_PUBLIC_API_URL은 빌드타임에 번들에 박히므로, 도메인이 바뀌면
  # 이 태그(이미지)를 다시 빌드해야 한다 (docs/api/README 및 루트 README 참고).
  repository: smtm-frontend
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 3000

strategy:
  maxSurge: 1
  maxUnavailable: 0

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

probes:
  path: /
  startup:
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpreadConstraints:
  enabled: true
  zone:
    maxSkew: 1
    whenUnsatisfiable: DoNotSchedule
  hostname:
    maxSkew: 1
    whenUnsatisfiable: ScheduleAnyway

ingress:
  enabled: false
  className: alb
  host: smtm.example.invalid
  backendServiceName: smtm-backend
  backendServicePort: 8080
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
